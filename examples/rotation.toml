# Example local refresh config.
# Keep your real config private and outside the repo, for example:
# ~/.config/github-contrib-awtrix/rotation.toml

[[apps]]
app_name = "github_green"
source = "profile"
login = "octocat"
token_env = "GITHUB_TOKEN"
color_mode = "green"
velocity = true

[[apps]]
app_name = "github_purple"
source = "commit-search"
org = "example-org"
token_env = "GITHUB_TOKEN"
color_mode = "purple"
velocity = true

[[apps]]
app_name = "github_yellow"
source = "commit-search"
repo = "example-org/example-repo"
token_env = "GITHUB_TOKEN"
color_mode = "yellow"
velocity = true
